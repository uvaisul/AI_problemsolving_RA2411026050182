<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Problem Solving</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI Problem Solving Dashboard</h1>

    <!-- TSP SECTION -->
    <div class="card">
        <h2>🚍 School Bus Route (TSP)</h2>
        <textarea id="tspInput" placeholder="Distance Matrix (comma separated)
Example:
0,10,15
10,0,20
15,20,0"></textarea>
        <button onclick="runTSP()">Solve TSP</button>
        <p id="tspResult"></p>
    </div>

    <!-- MINIMAX SECTION -->
    <div class="card">
        <h2>🧠 Job Scheduling (Minimax)</h2>
        <textarea id="jobInput" placeholder="Jobs:
Job1,5
Job2,3
Job3,7"></textarea>
        <button onclick="runMinimax()">Find Schedule</button>
        <p id="jobResult"></p>
    </div>
</div>

<script src="tsp.js"></script>
<script src="minimax.js"></script>

</body>
</html>
